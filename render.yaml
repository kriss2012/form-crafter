services:
  - type: web
    name: formmaker-api
    runtime: docker
    repo: https://github.com/kriss2012/form-crafter
    region: oregon
    branch: main
    dockerfilePath: Render.Dockerfile
    dockerCommand: ""
    envVars:
      - key: AzureWebJobsStorage
        value: UseDevelopmentStorage=false
      - key: FUNCTIONS_WORKER_RUNTIME
        value: dotnet-isolated
      - key: JwtSecret
        generateValue: true
      - key: JwtIssuer
        value: FormMaker
      - key: JwtAudience
        value: FormMakerClient
      - key: ConnectionStrings__FormMakerDb
        value: Data Source=/app/data/formmaker.db
    plan: free
    healthCheckPath: /

  # static site for the Blazor client
  - type: static
    name: formmaker-client
    repo: https://github.com/kriss2012/form-crafter
    branch: main
    buildCommand: dotnet publish FormMaker.Client/FormMaker.Client.csproj -c Release -o publish
    publishPath: publish/wwwroot
    plan: free
